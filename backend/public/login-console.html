<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Console Admin — Connexion | Agent Boutique</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      padding: 48px 40px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 90%;
    }
    .card h1 {
      color: #1e293b;
      font-size: 1.5rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .card p {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    input:focus {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }
    .btn {
      width: 100%;
      background: #0ea5e9;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn:hover { background: #0284c7; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert {
      background: #fef2f2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
      border: 1px solid #fecaca;
    }
    .alert.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔒 Console Admin</h1>
    <p>Accès réservé — entrez votre mot de passe pour continuer.</p>
    <div id="alert" class="alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" autofocus>
      </div>
      <button type="submit" class="btn" id="btn">Accéder</button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const alertEl  = document.getElementById('alert');
      const btn      = document.getElementById('btn');

      alertEl.className = 'alert';
      btn.disabled = true;
      btn.textContent = 'Vérification...';

      try {
        const res = await fetch('/api/console/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (res.ok && data.success && data.token) {
          sessionStorage.setItem('console_token', data.token);
          window.location.href = '/console/console.html';
        } else {
          alertEl.textContent = data.error || 'Mot de passe incorrect';
          alertEl.className = 'alert show';
          btn.disabled = false;
          btn.textContent = 'Accéder';
          document.getElementById('password').select();
        }
      } catch (err) {
        alertEl.textContent = 'Erreur réseau : ' + err.message;
        alertEl.className = 'alert show';
        btn.disabled = false;
        btn.textContent = 'Accéder';
      }
    });
  </script>
</body>
</html>
