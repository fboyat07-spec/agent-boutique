<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Merci — Agent Boutique</title>
  <meta name="description" content="Votre demande a bien été reçue.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 20px 24px;
      text-align: center;
    }
    .header .logo { font-size: 1.25rem; font-weight: 700; color: #1e293b; }
    .header .logo span { color: #0ea5e9; }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .icon { font-size: 3.5rem; margin-bottom: 20px; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 16px;
    }

    p {
      color: #64748b;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 13px 28px;
      background: #0ea5e9;
      color: #fff;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #0284c7; }

    @media (max-width: 520px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Agent<span>Boutique</span></div>
</div>

<div class="container">
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Merci !</h1>
    <p>
      Votre demande a bien été reçue.<br>
      Notre équipe vous contacte dans les 24h<br>
      sur le numéro que vous avez indiqué.
    </p>
    <a href="https://agentboutique.fr" class="btn">Retour à l'accueil</a>
  </div>
</div>

</body>
</html>
