<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Agent Boutique — Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <style>
    /* ── Reset & base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Palette SaaS Premium */
      --bg-primary:     #ffffff;
      --bg-secondary:   #f8fafc;
      --bg-tertiary:  #f1f5f9;
      --surface:        #ffffff;
      --surface-hover:  #f8fafc;
      --border:        #e2e8f0;
      --border-strong:  #cbd5e1;
      --text-primary:   #0f172a;
      --text-secondary: #64748b;
      --text-muted:    #94a3b8;
      --blue:          #0ea5e9;
      --blue-dark:     #0284c7;
      --green:         #10b981;
      --orange:        #f59e0b;
      --red:           #ef4444;
      --purple:        #8b5cf6;
      --shadow-sm:      0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md:      0 4px 6px rgba(0, 0, 0, 0.07);
      --shadow-lg:      0 10px 15px rgba(0, 0, 0, 0.1);
      --radius-sm:     6px;
      --radius-md:     8px;
      --radius-lg:     12px;
      --transition:     all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      padding: 0;
      margin: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Layout Fullscreen 3 Colonnes ───────────────────────────────────── */
    .app-container {
      display: grid;
      grid-template-columns: 340px 1fr 320px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar Conversations ───────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .search-bar {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      font-size: 14px;
      transition: var(--transition);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
    }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
      margin-bottom: 4px;
    }

    .conversation-item:hover {
      background: var(--surface-hover);
      border-color: var(--border);
    }

    .conversation-item.active {
      background: var(--bg-secondary);
      border-color: var(--blue);
      box-shadow: var(--shadow-sm);
    }

    .conversation-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .conversation-info {
      flex: 1;
      min-width: 0;
    }

    .conversation-name {
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
      font-size: 14px;
    }

    .conversation-last-message {
      color: var(--text-secondary);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .conversation-badge {
      background: var(--blue);
      color: white;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
    }

    .conversation-badge.human {
      background: var(--orange);
    }

    .conversation-badge.ai {
      background: var(--blue);
    }

    .unread-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      margin-left: auto;
    }

    /* ── Zone Chat Principal ───────────────────────────────────── */
    .chat-area {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-primary);
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .chat-contact-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-contact-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 12px;
    }

    .chat-contact-details {
      flex: 1;
    }

    .chat-contact-name {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .chat-contact-status {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 8px;
      max-width: 70%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: var(--blue);
    }

    .message-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      position: relative;
    }

    .message.user .message-content {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }

    .message-text {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .message.user .message-time {
      color: rgba(255, 255, 255, 0.7);
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    .chat-input {
      padding: 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-container {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--bg-primary);
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      transition: var(--transition);
    }

    .message-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    .send-button {
      padding: 12px 20px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .send-button:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
    }

    /* ── Right Panel ───────────────────────────────────────────── */
    .right-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .right-panel-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .right-panel-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .right-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .lead-info-section {
      margin-bottom: 24px;
    }

    .lead-info-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .lead-info-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .lead-info-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .lead-info-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-badge.ai {
      background: var(--bg-secondary);
      color: var(--blue);
      border: 1px solid var(--blue);
    }

    .status-badge.human {
      background: var(--bg-secondary);
      color: var(--orange);
      border: 1px solid var(--orange);
    }

    .lead-score {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
    }

    .score-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .score-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 20px;
    }

    .action-button {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }

    .action-button:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .action-button.primary {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }

    .action-button.primary:hover {
      background: var(--blue-dark);
    }

    /* ── Responsive Design ───────────────────────────────────────────── */
    @media (max-width: 1200px) {
      .app-container {
        grid-template-columns: 300px 1fr 280px;
      }
    }

    @media (max-width: 968px) {
      .app-container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        height: auto;
        max-height: 200px;
      }

      .right-panel {
        border-left: none;
        border-top: 1px solid var(--border);
        height: auto;
        max-height: 200px;
      }
    }

    @media (max-width: 640px) {
      .app-container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: -340px;
        z-index: 100;
        height: 100vh;
        width: 340px;
        transition: left 0.3s ease;
      }

      .sidebar.open {
        left: 0;
      }

      .chat-area {
        height: 100vh;
      }

      .right-panel {
        display: none;
      }

      .chat-header {
        padding: 16px;
      }

      .chat-messages {
        padding: 16px;
      }

      .chat-input {
        padding: 16px;
      }
    }

    /* ── Animations & Effects ───────────────────────────────────── */
    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .slide-up {
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    /* ── Scroll Styling ───────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-strong);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- ── Sidebar Conversations ───────────────────────────────────── -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Conversations</div>
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" placeholder="Rechercher...">
        </div>
      </div>
      <div class="conversations-list" id="conversationsList">
        <!-- Conversations will be loaded from API -->
        <div class="loading-state">Chargement des conversations...</div>
      </div>
    </div>

    <!-- ── Zone Chat Principal ───────────────────────────────────── -->
    <div class="chat-area">
      <div class="chat-header" id="chatHeader">
        <div class="chat-contact-info">
          <div class="chat-contact-avatar" id="chatContactAvatar">--</div>
          <div class="chat-contact-details">
            <div class="chat-contact-name" id="chatContactName">Sélectionnez une conversation</div>
            <div class="chat-contact-status" id="chatContactStatus">--</div>
          </div>
        </div>
      </div>
      
      <div class="chat-messages" id="chatMessages">
        <!-- Messages will be loaded from API -->
        <div class="loading-state">Sélectionnez une conversation pour afficher les messages</div>
      </div>
      
      <div class="chat-input">
        <div class="input-container">
          <textarea class="message-input" placeholder="Tapez votre message..." rows="1"></textarea>
          <button class="send-button">
            <span>Envoyer</span>
            <span>→</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── Right Panel ───────────────────────────────────────────── -->
    <div class="right-panel">
      <div class="right-panel-header">
        <div class="right-panel-title">Informations Lead</div>
      </div>
      <div class="right-panel-content" id="rightPanelContent">
        <div class="lead-info-section">
          <div class="lead-info-title">Statut</div>
          <div class="lead-info-item">
            <span class="lead-info-label">Mode actuel</span>
            <span class="status-badge" id="currentModeBadge">--</span>
          </div>
        </div>
        
        <div class="lead-info-section">
          <div class="lead-info-title">Score Lead</div>
          <div class="lead-score">
            <div class="score-value" id="leadScore">--</div>
            <div class="score-label">/100</div>
          </div>
        </div>
        
        <div class="lead-info-section">
          <div class="lead-info-title">Informations</div>
          <div class="lead-info-item">
            <span class="lead-info-label">Nom</span>
            <span class="lead-info-value" id="leadName">--</span>
          </div>
          <div class="lead-info-item">
            <span class="lead-info-label">Téléphone</span>
            <span class="lead-info-value" id="leadPhone">--</span>
          </div>
          <div class="lead-info-item">
            <span class="lead-info-label">Business</span>
            <span class="lead-info-value" id="leadBusiness">--</span>
          </div>
          <div class="lead-info-item">
            <span class="lead-info-label">Messages</span>
            <span class="lead-info-value" id="leadMessages">--</span>
          </div>
        </div>
        
        <div class="lead-info-section">
          <div class="lead-info-title">Actions Rapides</div>
          <div class="action-buttons">
            <button class="action-button primary" id="takeoverBtn">Prendre en main</button>
            <button class="action-button" id="releaseBtn" style="display: none;">Relâcher vers IA</button>
            <button class="action-button" id="historyBtn">Voir l'historique</button>
            <button class="action-button" id="paymentBtn">Envoyer lien paiement</button>
            <button class="action-button" id="archiveBtn">Archiver</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const API_BASE = '/api/admin/chat';
    const AUTH_TOKEN = 'console_admin_2024'; // Token d'authentification admin
    
    // État global
    let currentConversationId = null;
    let currentTenantId = 'DEFAULT'; // Tenant par défaut
    let conversations = [];
    
    // Éléments DOM
    const conversationsList = document.getElementById('conversationsList');
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.querySelector('.message-input');
    const sendButton = document.querySelector('.send-button');
    const searchInput = document.querySelector('.search-input');
    
    // Header elements
    const chatContactAvatar = document.getElementById('chatContactAvatar');
    const chatContactName = document.getElementById('chatContactName');
    const chatContactStatus = document.getElementById('chatContactStatus');
    
    // Right panel elements
    const currentModeBadge = document.getElementById('currentModeBadge');
    const leadScore = document.getElementById('leadScore');
    const leadName = document.getElementById('leadName');
    const leadPhone = document.getElementById('leadPhone');
    const leadBusiness = document.getElementById('leadBusiness');
    const leadMessages = document.getElementById('leadMessages');
    
    // Action buttons
    const takeoverBtn = document.getElementById('takeoverBtn');
    const releaseBtn = document.getElementById('releaseBtn');
    
    // Helper pour fetch avec auth
    async function apiCall(url, options = {}) {
      const response = await fetch(url, {
        headers: {
          'Authorization': `Bearer ${AUTH_TOKEN}`,
          'Content-Type': 'application/json',
          ...options.headers
        },
        ...options
      });
      
      if (!response.ok) {
        throw new Error(`API Error: ${response.status}`);
      }
      
      return response.json();
    }
    
    // Charger toutes les conversations
    async function loadConversations() {
      try {
        const data = await apiCall(`${API_BASE}/conversations`);
        conversations = data.conversations;
        renderConversations();
      } catch (error) {
        console.error('[CONSOLE] Error loading conversations:', error);
        conversationsList.innerHTML = '<div class="error-state">Erreur de chargement des conversations</div>';
      }
    }
    
    // Afficher les conversations
    function renderConversations() {
      if (!conversations.length) {
        conversationsList.innerHTML = '<div class="empty-state">Aucune conversation</div>';
        return;
      }
      
      conversationsList.innerHTML = conversations.map(conv => `
        <div class="conversation-item ${conv.id === currentConversationId ? 'active' : ''}" data-id="${conv.id}">
          <div class="conversation-avatar">${conv.phone.substring(0, 2).toUpperCase()}</div>
          <div class="conversation-info">
            <div class="conversation-name">${conv.phone}</div>
            <div class="conversation-last-message">${conv.lastMessage?.content || 'Nouveau message'}</div>
            <div class="conversation-meta">
              <span class="conversation-badge ${conv.mode.toLowerCase()}">${conv.mode}</span>
              <span>${formatTime(conv.lastInteraction)}</span>
            </div>
          </div>
          ${conv.unread ? '<div class="unread-indicator"></div>' : ''}
        </div>
      `).join('');
      
      // Ajouter les écouteurs d'événements
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.addEventListener('click', () => selectConversation(item.dataset.id));
      });
    }
    
    // Sélectionner une conversation
    async function selectConversation(conversationId) {
      currentConversationId = conversationId;
      
      // Mettre à jour l'UI
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.toggle('active', item.dataset.id === conversationId);
      });
      
      try {
        const data = await apiCall(`${API_BASE}/conversation/${conversationId}`);
        const conversation = data.conversation;
        
        // Mettre à jour le header
        updateChatHeader(conversation);
        
        // Afficher les messages
        renderMessages(conversation.messages);
        
        // Mettre à jour le right panel
        updateRightPanel(conversation);
        
      } catch (error) {
        console.error('[CONSOLE] Error loading conversation:', error);
        chatMessages.innerHTML = '<div class="error-state">Erreur de chargement des messages</div>';
      }
    }
    
    // Mettre à jour le header chat
    function updateChatHeader(conversation) {
      const initials = conversation.phone.substring(0, 2).toUpperCase();
      chatContactAvatar.textContent = initials;
      chatContactName.textContent = conversation.phone;
      chatContactStatus.textContent = conversation.phone;
    }
    
    // Afficher les messages
    function renderMessages(messages) {
      if (!messages.length) {
        chatMessages.innerHTML = '<div class="empty-state">Aucun message</div>';
        return;
      }
      
      chatMessages.innerHTML = messages.map(msg => `
        <div class="message ${msg.sender}">
          <div class="message-avatar">${msg.sender === 'admin' ? 'AD' : 'IA'}</div>
          <div class="message-content">
            <div class="message-text">${msg.content}</div>
            <div class="message-time">${formatTime(msg.timestamp)}</div>
          </div>
        </div>
      `).join('');
      
      // Scroll en bas
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // Mettre à jour le right panel
    function updateRightPanel(conversation) {
      const mode = conversation.mode || 'IA';
      currentModeBadge.textContent = mode;
      currentModeBadge.className = `status-badge ${mode.toLowerCase()}`;
      
      // Afficher/cacher les boutons selon le mode
      takeoverBtn.style.display = mode === 'IA' ? 'block' : 'none';
      releaseBtn.style.display = mode === 'HUMAN' ? 'block' : 'none';
      
      // Mettre à jour les infos (pour l'instant basiques)
      leadScore.textContent = '--';
      leadName.textContent = 'Non configuré';
      leadPhone.textContent = conversation.phone;
      leadBusiness.textContent = 'Non configuré';
      leadMessages.textContent = conversation.messages?.length || 0;
    }
    
    // Envoyer un message
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || !currentConversationId) return;
      
      const conversation = conversations.find(c => c.id === currentConversationId);
      if (!conversation) return;
      
      try {
        const data = await apiCall(`${API_BASE}/send`, {
          method: 'POST',
          body: JSON.stringify({
            phone: conversation.phone,
            message: message,
            conversationId: currentConversationId,
            tenant_id: currentTenantId
          })
        });
        
        // Ajouter le message à l'UI
        const newMessage = data.message;
        const messagesContainer = chatMessages.querySelector('.empty-state') ? 
          chatMessages : chatMessages;
        
        if (!messagesContainer.querySelector('.empty-state')) {
          messagesContainer.innerHTML += `
            <div class="message admin">
              <div class="message-avatar">AD</div>
              <div class="message-content">
                <div class="message-text">${newMessage.content}</div>
                <div class="message-time">${formatTime(newMessage.timestamp)}</div>
              </div>
            </div>
          `;
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Vider l'input
        messageInput.value = '';
        messageInput.style.height = 'auto';
        
        // Recharger les conversations pour mettre à jour
        await loadConversations();
        
      } catch (error) {
        console.error('[CONSOLE] Error sending message:', error);
        alert('Erreur lors de l\'envoi du message');
      }
    }
    
    // Prendre le contrôle
    async function takeOver() {
      if (!currentConversationId) return;
      
      try {
        const data = await apiCall(`${API_BASE}/takeover`, {
          method: 'POST',
          body: JSON.stringify({
            conversationId: currentConversationId,
            tenant_id: currentTenantId
          })
        });
        
        // Mettre à jour l'UI
        currentModeBadge.textContent = 'HUMAN';
        currentModeBadge.className = 'status-badge human';
        takeoverBtn.style.display = 'none';
        releaseBtn.style.display = 'block';
        
        // Recharger les conversations
        await loadConversations();
        
      } catch (error) {
        console.error('[CONSOLE] Error taking over:', error);
        alert('Erreur lors de la prise de contrôle');
      }
    }
    
    // Relâcher vers IA
    async function release() {
      if (!currentConversationId) return;
      
      try {
        const data = await apiCall(`${API_BASE}/release`, {
          method: 'POST',
          body: JSON.stringify({
            conversationId: currentConversationId,
            tenant_id: currentTenantId
          })
        });
        
        // Mettre à jour l'UI
        currentModeBadge.textContent = 'IA';
        currentModeBadge.className = 'status-badge ai';
        takeoverBtn.style.display = 'block';
        releaseBtn.style.display = 'none';
        
        // Recharger les conversations
        await loadConversations();
        
      } catch (error) {
        console.error('[CONSOLE] Error releasing:', error);
        alert('Erreur lors du relâchement');
      }
    }
    
    // Formater l'heure
    function formatTime(timestamp) {
      if (!timestamp) return '--';
      const date = new Date(timestamp);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      
      if (diffMins < 1) return 'À l\'instant';
      if (diffMins < 60) return `Il y a ${diffMins} min`;
      if (diffHours < 24) return `Il y a ${diffHours} h`;
      if (diffDays < 7) return `Il y a ${diffDays} j`;
      return date.toLocaleDateString('fr-FR');
    }
    
    // Auto-resize textarea
    if (messageInput) {
      messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      // Send message on Enter
      messageInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    }
    
    // Send button click
    if (sendButton) {
      sendButton.addEventListener('click', sendMessage);
    }
    
    // Action buttons
    if (takeoverBtn) {
      takeoverBtn.addEventListener('click', takeOver);
    }
    
    if (releaseBtn) {
      releaseBtn.addEventListener('click', release);
    }
    
    // Search functionality
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase();
        const filteredConversations = conversations.filter(conv => 
          conv.phone.toLowerCase().includes(searchTerm) ||
          (conv.lastMessage?.content || '').toLowerCase().includes(searchTerm)
        );
        
        conversationsList.innerHTML = filteredConversations.map(conv => `
          <div class="conversation-item ${conv.id === currentConversationId ? 'active' : ''}" data-id="${conv.id}">
            <div class="conversation-avatar">${conv.phone.substring(0, 2).toUpperCase()}</div>
            <div class="conversation-info">
              <div class="conversation-name">${conv.phone}</div>
              <div class="conversation-last-message">${conv.lastMessage?.content || 'Nouveau message'}</div>
              <div class="conversation-meta">
                <span class="conversation-badge ${conv.mode.toLowerCase()}">${conv.mode}</span>
                <span>${formatTime(conv.lastInteraction)}</span>
              </div>
            </div>
            ${conv.unread ? '<div class="unread-indicator"></div>' : ''}
          </div>
        `).join('');
        
        // Ré-attacher les écouteurs
        document.querySelectorAll('.conversation-item').forEach(item => {
          item.addEventListener('click', () => selectConversation(item.dataset.id));
        });
      });
    }
    
    // Initialisation
    loadConversations();
    
    // Auto-refresh toutes les 30 secondes
    setInterval(loadConversations, 30000);
  </script>
</body>
</html>
